<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="AI-powered financial analysis terminal for real-time market insights, stock analysis, and intelligent trading signals." />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>MarketSense AI | Financial Intelligence Terminal</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect to backend API for faster auth calls -->
    <link rel="preconnect" href="https://marketsense-ai.onrender.com" crossorigin />
    <!-- Non-blocking font loading: load as print, swap to all on load -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" /></noscript>
    <!-- Inline critical CSS for instant loading indicator -->
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: #09090b; font-family: 'Inter', system-ui, sans-serif; }
      #app-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #09090b; z-index: 9999;
      }
      #app-loader .spinner {
        width: 36px; height: 36px; border: 3px solid #27272a;
        border-top-color: #14b8a6; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Instant loading spinner visible before JS loads -->
      <div id="app-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
