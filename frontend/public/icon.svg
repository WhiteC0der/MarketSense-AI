<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>

  <!-- Bars -->
  <rect x="100" y="300" width="80" height="120" fill="black"/>
  <rect x="220" y="260" width="80" height="160" fill="black"/>
  <rect x="340" y="200" width="80" height="220" fill="black"/>

  <!-- Arrow line -->
  <polyline 
    points="60,340 180,220 260,300 400,140" 
    fill="none" 
    stroke="black" 
    stroke-width="20" 
    stroke-linecap="square" 
    stroke-linejoin="miter"
  />

  <!-- Arrow head -->
  <polygon points="400,140 370,140 400,110 430,140" fill="black"/>
</svg>